name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Compile backend
        working-directory: backend
        env:
          SECRET_KEY: ci-only-secret-not-for-production
          ADMIN_USERNAME: ci-admin
          ADMIN_PASSWORD: ci-password
          CORS_ORIGINS: http://localhost:5173
        run: python -m py_compile main.py models.py database.py auth.py config.py seed.py

      - name: Import FastAPI app
        working-directory: backend
        env:
          SECRET_KEY: ci-only-secret-not-for-production
          ADMIN_USERNAME: ci-admin
          ADMIN_PASSWORD: ci-password
          CORS_ORIGINS: http://localhost:5173
        run: python -c "from main import app; print(app.title)"
